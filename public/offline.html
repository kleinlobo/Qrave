<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qrave — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
      text-align: center;
    }
    .card { max-width: 300px; space-y: 12px; }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      margin: 0 auto 20px;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 0.875rem; color: #888; margin-bottom: 24px; }
    button {
      background: #fafafa;
      color: #0a0a0a;
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Q</div>
    <h1>You&rsquo;re offline</h1>
    <p>Check your connection and try again.<br />Your cart is safe until you reconnect.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
